<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>virus ti snow // editor</title>
<style>
  :root{
    --black: #000000;
    --white: #ffffff;
  }
  *{
    box-sizing: border-box;
  }
  body{
    margin: 0;
    background: var(--white);
    color: var(--black);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 32px 40px;
  }

  .header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    border-bottom: 1px solid var(--black);
    padding-bottom: 16px;
    margin-bottom: 32px;
    text-transform: lowercase;
  }
  .header .title{
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.05em;
  }
  .midi{
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .field{
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .field label{
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--black);
  }
  select{
    background: transparent;
    color: var(--black);
    border: none;
    border-bottom: 1px solid var(--black);
    font-family: inherit;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    padding: 2px 0;
    outline: none;
    text-transform: lowercase;
  }
  .conn{
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
  }
  .dot{
    width: 6px;
    height: 6px;
    border: 1px solid var(--black);
    border-radius: 50%;
    background: transparent;
  }
  .dot.on{
    background: var(--black);
  }

  .actions{
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    margin-bottom: 40px;
  }
  button{
    background: none;
    border: none;
    color: var(--black);
    font-family: inherit;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    cursor: pointer;
    padding: 0 0 2px 0;
    border-bottom: 1px solid transparent;
  }
  button:hover{
    border-bottom: 1px solid var(--black);
  }

  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 48px;
    margin-bottom: 48px;
  }
  .section h2{
    margin: 0 0 24px 0;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    color: var(--black);
  }
  .knobs{
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
  }
  .knob-container{
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 48px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .knob-svg{
    cursor: ns-resize;
  }
  .knob-label{
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    margin-top: 8px;
    color: var(--black);
  }
  .knob-value{
    font-family: "SF Mono", Menlo, Monaco, monospace;
    font-size: 13px;
    font-weight: 300;
    margin-top: 2px;
    color: var(--black);
    cursor: text;
  }

  .library{
    border-top: 1px solid var(--black);
    padding-top: 24px;
  }
  .library-title{
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    margin-bottom: 16px;
  }
  .lib-row{
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: center;
    margin-bottom: 24px;
  }
  input[type="text"]{
    flex: 1;
    min-width: 160px;
    background: transparent;
    color: var(--black);
    border: none;
    border-bottom: 1px solid var(--black);
    font-family: inherit;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    padding: 2px 0;
    outline: none;
    text-transform: lowercase;
  }
  .lib-list{
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .lib-item{
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
  }
  .lib-item .name{
    letter-spacing: 0.05em;
  }
  .lib-item .btns{ display: flex; gap: 16px; }
  input[type="file"]{ display: none; }
  .small{ font-size: 10px; color: var(--black); opacity: 0.5; letter-spacing: 0.05em; }
</style>
</head>
<body>

<div class="header">
  <div class="title">virus ti snow</div>
  <div class="midi">
    <div class="field">
      <label>output</label>
      <select id="midiOutSelect"><option value="">none</option></select>
    </div>
    <div class="field">
      <label>channel</label>
      <select id="midiChannel"></select>
    </div>
    <div class="conn">
      <span class="dot" id="connDot"></span>
      <span id="connLabel">disconnected</span>
    </div>
  </div>
</div>

<div class="actions">
  <button id="btnRandomize">randomize</button>
  <button id="btnInit">init</button>
  <button id="btnExport">export .syx</button>
  <button id="btnImport">import .syx</button>
  <input type="file" id="fileInput" accept=".syx">
</div>

<div class="grid" id="sectionsContainer"></div>

<div class="library">
  <div class="library-title">patch library</div>
  <div class="lib-row">
    <input type="text" id="patchName" placeholder="patch name">
    <button id="btnSavePatch">save</button>
  </div>
  <div class="lib-list" id="libList"></div>
</div>

<script>
(function(){
  // ---------------------------------------------------------------------
  // Parameter definitions: Virus TI parameter numbers per spec
  // SysEx format: F0 00 20 33 01 [DeviceID] 01 [param] [value] F7
  // ---------------------------------------------------------------------
  const SECTIONS = [
    { key: 'osc',    title: 'oscillators' },
    { key: 'filter', title: 'filter 1' },
    { key: 'amp',    title: 'amplifier' },
    { key: 'lfo',    title: 'lfo 1' },
    { key: 'fx',     title: 'effects' },
  ];

  const PARAMS = [
    // Oscillator 1
    { id:'osc1_wave',       name:'Osc1 Waveform',     short:'o1wv', section:'osc', cc:17, default:0 },
    { id:'osc1_pw',         name:'Osc1 Pulsewidth',   short:'o1pw', section:'osc', cc:18, default:64 },
    { id:'osc1_waveselect', name:'Osc1 Wave Select',  short:'o1ws', section:'osc', cc:19, default:0 },
    { id:'osc1_semitone',   name:'Osc1 Semitone',     short:'o1st', section:'osc', cc:20, default:64, bipolar:true },
    // Oscillator 2
    { id:'osc2_wave',       name:'Osc2 Waveform',     short:'o2wv', section:'osc', cc:22, default:0 },
    { id:'osc2_pw',         name:'Osc2 Pulsewidth',   short:'o2pw', section:'osc', cc:23, default:64 },
    { id:'osc2_waveselect', name:'Osc2 Wave Select',  short:'o2ws', section:'osc', cc:24, default:0 },
    { id:'osc2_semitone',   name:'Osc2 Semitone',     short:'o2st', section:'osc', cc:25, default:64, bipolar:true },
    // Shared detune (Osc1/Osc2)
    { id:'osc_detune',      name:'Osc Detune',        short:'det',  section:'osc', cc:26, default:0 },

    // Filter 1
    { id:'f1_cutoff',    name:'Cutoff',            short:'cutoff', section:'filter', cc:40, default:127 },
    { id:'f1_resonance', name:'Resonance',         short:'res',    section:'filter', cc:42, default:0 },
    { id:'f1_envamount', name:'Env Amount',        short:'env',    section:'filter', cc:44, default:64, bipolar:true },
    { id:'f1_keytrack',  name:'Keyboard Track',    short:'key',    section:'filter', cc:46, default:0 },

    // Amplifier
    { id:'amp_attack',  name:'Attack',  short:'atk', section:'amp', cc:59, default:0 },
    { id:'amp_decay',   name:'Decay',   short:'dcy', section:'amp', cc:60, default:0 },
    { id:'amp_sustain', name:'Sustain', short:'sus', section:'amp', cc:61, default:127 },
    { id:'amp_release', name:'Release', short:'rel', section:'amp', cc:63, default:0 },

    // LFO 1
    { id:'lfo1_rate',  name:'Rate',  short:'rate', section:'lfo', cc:67, default:64 },
    { id:'lfo1_shape', name:'Shape', short:'shape', section:'lfo', cc:68, default:0 },

    // Effects
    { id:'fx_chorus_mix',      name:'Chorus Mix',      short:'chorus mix',  section:'fx', cc:105, default:0 },
    { id:'fx_chorus_rate',     name:'Chorus Rate',     short:'chorus rate', section:'fx', cc:106, default:64 },
    { id:'fx_delay_time',      name:'Delay Time',      short:'delay time',  section:'fx', cc:114, default:0 },
    { id:'fx_delay_feedback',  name:'Delay Feedback',  short:'delay fb',    section:'fx', cc:115, default:0 },
  ];

  const SYSEX_PREFIX = [0xF0, 0x00, 0x20, 0x33, 0x01];
  const SYSEX_CMD_PARAM = 0x01; // single parameter change

  // ---------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------
  const patch = {};
  PARAMS.forEach(p => { patch[p.id] = p.default; });

  let midiAccess = null;
  let selectedOutput = null;

  const LIB_KEY = 'virusTiSnow_patchLibrary';

  // ---------------------------------------------------------------------
  // MIDI setup
  // ---------------------------------------------------------------------
  const outSelect = document.getElementById('midiOutSelect');
  const chanSelect = document.getElementById('midiChannel');
  const connDot = document.getElementById('connDot');
  const connLabel = document.getElementById('connLabel');

  for (let i = 1; i <= 16; i++){
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = 'channel ' + i;
    chanSelect.appendChild(opt);
  }
  chanSelect.value = 1;

  function updateConnectionIndicator(){
    if (selectedOutput && selectedOutput.state === 'connected'){
      connDot.classList.add('on');
      connLabel.textContent = 'connected: ' + selectedOutput.name;
    } else {
      connDot.classList.remove('on');
      connLabel.textContent = 'disconnected';
    }
  }

  function refreshOutputs(){
    const prev = outSelect.value;
    outSelect.innerHTML = '<option value="">none</option>';
    if (!midiAccess) return;
    midiAccess.outputs.forEach(output => {
      const opt = document.createElement('option');
      opt.value = output.id;
      opt.textContent = output.name;
      outSelect.appendChild(opt);
    });
    if (prev && [...outSelect.options].some(o => o.value === prev)){
      outSelect.value = prev;
    }
    onOutputChange();
  }

  function onOutputChange(){
    const id = outSelect.value;
    selectedOutput = (midiAccess && id) ? midiAccess.outputs.get(id) : null;
    updateConnectionIndicator();
  }

  outSelect.addEventListener('change', onOutputChange);

  if (navigator.requestMIDIAccess){
    navigator.requestMIDIAccess({ sysex: true }).then(access => {
      midiAccess = access;
      refreshOutputs();
      midiAccess.onstatechange = refreshOutputs;
    }).catch(err => {
      connLabel.textContent = 'midi unavailable';
      console.error(err);
    });
  } else {
    connLabel.textContent = 'web midi not supported';
  }

  // ---------------------------------------------------------------------
  // SysEx send
  // ---------------------------------------------------------------------
  function deviceId(){
    return parseInt(chanSelect.value, 10) - 1; // 0-15
  }

  function buildSysEx(cc, value){
    return new Uint8Array([
      ...SYSEX_PREFIX,
      deviceId(),
      SYSEX_CMD_PARAM,
      cc & 0x7F,
      value & 0x7F,
      0xF7
    ]);
  }

  function sendParam(param, value){
    if (selectedOutput){
      try{
        selectedOutput.send(buildSysEx(param.cc, value));
      } catch(e){ console.error('MIDI send error', e); }
    }
  }

  function sendFullPatch(p){
    PARAMS.forEach((param, i) => {
      setTimeout(() => sendParam(param, p[param.id]), i * 15);
    });
  }

  // ---------------------------------------------------------------------
  // Knob UI — minimal thin-stroke circle with a single radial indicator
  // line showing the current value (-135deg to +135deg sweep, 0deg = up).
  // ---------------------------------------------------------------------
  const svgNS = 'http://www.w3.org/2000/svg';
  const KNOB_SIZE = 36;
  const KNOB_CENTER = KNOB_SIZE / 2;
  const KNOB_RADIUS = 16;

  function angleForValue(value){
    return (-135 + (value / 127) * 270) * Math.PI / 180;
  }

  function displayValue(param, value){
    if (param.bipolar) {
      const v = value - 64;
      return (v > 0 ? '+' : '') + v;
    }
    return String(value);
  }

  function createKnob(param){
    const container = document.createElement('div');
    container.className = 'knob-container';

    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', `0 0 ${KNOB_SIZE} ${KNOB_SIZE}`);
    svg.setAttribute('width', KNOB_SIZE);
    svg.setAttribute('height', KNOB_SIZE);
    svg.classList.add('knob-svg');

    // thin stroke circle, no fill
    const circle = document.createElementNS(svgNS, 'circle');
    circle.setAttribute('cx', KNOB_CENTER);
    circle.setAttribute('cy', KNOB_CENTER);
    circle.setAttribute('r', KNOB_RADIUS);
    circle.setAttribute('fill', 'none');
    circle.setAttribute('stroke', '#000000');
    circle.setAttribute('stroke-width', '0.5');
    svg.appendChild(circle);

    // single thin line from center to edge showing the value
    const indicator = document.createElementNS(svgNS, 'line');
    indicator.setAttribute('x1', KNOB_CENTER);
    indicator.setAttribute('y1', KNOB_CENTER);
    indicator.setAttribute('stroke', '#000000');
    indicator.setAttribute('stroke-width', '1');
    svg.appendChild(indicator);

    const label = document.createElement('div');
    label.className = 'knob-label';
    label.textContent = param.short || param.name;

    const valueLabel = document.createElement('div');
    valueLabel.className = 'knob-value';

    container.appendChild(svg);
    container.appendChild(label);
    container.appendChild(valueLabel);

    function render(){
      const value = patch[param.id];
      const angle = angleForValue(value);
      indicator.setAttribute('x2', KNOB_CENTER + Math.sin(angle) * KNOB_RADIUS);
      indicator.setAttribute('y2', KNOB_CENTER - Math.cos(angle) * KNOB_RADIUS);
      valueLabel.textContent = displayValue(param, value);
    }

    function setValue(value, send){
      value = Math.max(0, Math.min(127, Math.round(value)));
      patch[param.id] = value;
      render();
      if (send) sendParam(param, value);
    }

    // drag interaction
    let dragging = false;
    let startY = 0;
    let startVal = 0;

    svg.addEventListener('pointerdown', (e) => {
      dragging = true;
      startY = e.clientY;
      startVal = patch[param.id];
      svg.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    svg.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dy = startY - e.clientY;
      setValue(startVal + dy * 0.7, true);
    });

    function endDrag(e){
      dragging = false;
    }
    svg.addEventListener('pointerup', endDrag);
    svg.addEventListener('pointercancel', endDrag);

    // double-click to type exact value
    valueLabel.addEventListener('dblclick', () => {
      const current = patch[param.id];
      const input = prompt('value (0-127):', current);
      if (input === null) return;
      const num = parseInt(input, 10);
      if (!isNaN(num)) setValue(num, true);
    });

    container._render = render;
    container._setValue = setValue;
    render();

    return container;
  }

  // ---------------------------------------------------------------------
  // Build sections
  // ---------------------------------------------------------------------
  const knobRefs = {}; // id -> container element

  function buildSections(){
    const root = document.getElementById('sectionsContainer');
    root.innerHTML = '';
    SECTIONS.forEach(sec => {
      const div = document.createElement('div');
      div.className = 'section';
      const h2 = document.createElement('h2');
      h2.textContent = sec.title;
      div.appendChild(h2);

      const knobs = document.createElement('div');
      knobs.className = 'knobs';

      PARAMS.filter(p => p.section === sec.key).forEach(param => {
        const knob = createKnob(param);
        knobRefs[param.id] = knob;
        knobs.appendChild(knob);
      });

      div.appendChild(knobs);
      root.appendChild(div);
    });
  }

  function refreshAllKnobs(){
    PARAMS.forEach(p => knobRefs[p.id]._render());
  }

  function applyPatchObject(p, send){
    PARAMS.forEach(param => {
      const value = (p[param.id] !== undefined) ? p[param.id] : param.default;
      patch[param.id] = Math.max(0, Math.min(127, value));
    });
    refreshAllKnobs();
    if (send) sendFullPatch(patch);
  }

  // ---------------------------------------------------------------------
  // Buttons: Randomize / Init
  // ---------------------------------------------------------------------
  document.getElementById('btnRandomize').addEventListener('click', () => {
    const newPatch = {};
    PARAMS.forEach(p => { newPatch[p.id] = Math.floor(Math.random() * 128); });
    applyPatchObject(newPatch, true);
  });

  document.getElementById('btnInit').addEventListener('click', () => {
    const newPatch = {};
    PARAMS.forEach(p => { newPatch[p.id] = p.default; });
    applyPatchObject(newPatch, true);
  });

  // ---------------------------------------------------------------------
  // Export / Import .syx
  // ---------------------------------------------------------------------
  document.getElementById('btnExport').addEventListener('click', () => {
    const bytes = [];
    PARAMS.forEach(param => {
      bytes.push(...buildSysEx(param.cc, patch[param.id]));
    });
    const blob = new Blob([new Uint8Array(bytes)], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'virus_ti_patch.syx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  const fileInput = document.getElementById('fileInput');
  document.getElementById('btnImport').addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const bytes = new Uint8Array(reader.result);
      const newPatch = {};
      let i = 0;
      while (i < bytes.length){
        if (bytes[i] === 0xF0){
          // find matching F7
          let j = i + 1;
          while (j < bytes.length && bytes[j] !== 0xF7) j++;
          if (j < bytes.length){
            const msg = bytes.slice(i, j + 1);
            // Expect: F0 00 20 33 01 [DeviceID] 01 [param] [value] F7
            if (msg.length === 10 &&
                msg[1] === 0x00 && msg[2] === 0x20 && msg[3] === 0x33 &&
                msg[4] === 0x01 && msg[6] === 0x01){
              const cc = msg[7];
              const value = msg[8];
              const param = PARAMS.find(p => p.cc === cc);
              if (param) newPatch[param.id] = value;
            }
            i = j + 1;
            continue;
          }
        }
        i++;
      }
      applyPatchObject(newPatch, true);
    };
    reader.readAsArrayBuffer(file);
    fileInput.value = '';
  });

  // ---------------------------------------------------------------------
  // Patch library (localStorage)
  // ---------------------------------------------------------------------
  function loadLibrary(){
    try{
      return JSON.parse(localStorage.getItem(LIB_KEY)) || {};
    } catch(e){ return {}; }
  }

  function saveLibrary(lib){
    localStorage.setItem(LIB_KEY, JSON.stringify(lib));
  }

  function renderLibrary(){
    const lib = loadLibrary();
    const list = document.getElementById('libList');
    list.innerHTML = '';
    const names = Object.keys(lib).sort();
    if (names.length === 0){
      const empty = document.createElement('div');
      empty.className = 'small';
      empty.textContent = 'no patches saved';
      list.appendChild(empty);
      return;
    }
    names.forEach(name => {
      const item = document.createElement('div');
      item.className = 'lib-item';

      const nameEl = document.createElement('span');
      nameEl.className = 'name';
      nameEl.textContent = name;

      const btns = document.createElement('div');
      btns.className = 'btns';

      const loadBtn = document.createElement('button');
      loadBtn.textContent = 'load';
      loadBtn.addEventListener('click', () => {
        applyPatchObject(lib[name], true);
      });

      const delBtn = document.createElement('button');
      delBtn.textContent = 'delete';
      delBtn.addEventListener('click', () => {
        if (confirm(`delete patch "${name}"?`)){
          delete lib[name];
          saveLibrary(lib);
          renderLibrary();
        }
      });

      btns.appendChild(loadBtn);
      btns.appendChild(delBtn);
      item.appendChild(nameEl);
      item.appendChild(btns);
      list.appendChild(item);
    });
  }

  document.getElementById('btnSavePatch').addEventListener('click', () => {
    const input = document.getElementById('patchName');
    const name = input.value.trim();
    if (!name){
      alert('enter a patch name');
      return;
    }
    const lib = loadLibrary();
    lib[name] = { ...patch };
    saveLibrary(lib);
    input.value = '';
    renderLibrary();
  });

  // ---------------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------------
  buildSections();
  renderLibrary();
})();
</script>
</body>
</html>
