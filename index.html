<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>virus ti snow // editor</title>
<style>
  :root{
    --bg: #ffffff;
    --fg: #000000;
    --section-bg: #f5f5f5;
    --border: #000000;
    --dot-color: #e8e8e8;
  }
  html[data-theme="dark"]{
    --bg: #111111;
    --fg: #eeeeee;
    --section-bg: #1a1a1a;
    --border: #333333;
    --dot-color: #222222;
  }
  *{
    box-sizing: border-box;
  }
  html, body{
    height: 100%;
  }
  body{
    margin: 0;
    background-color: var(--bg);
    background-image: radial-gradient(circle, var(--dot-color) 1px, transparent 1.5px);
    background-size: 8px 8px;
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 16px;
    transition: background-color 200ms ease, color 200ms ease;
  }

  /* ------------------------------------------------------------------ */
  /* header                                                              */
  /* ------------------------------------------------------------------ */
  .header{
    display: flex;
    flex-direction: column;
    flex: 0 0 auto;
    margin-bottom: 8px;
  }
  .header-display{
    display: block;
    width: 100%;
    height: 80px;
    background: transparent;
    transition: opacity 300ms ease;
  }
  .header-display.flash{
    opacity: 1;
    filter: brightness(1.6);
  }
  .header-bar{
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
    padding-top: 8px;
    min-height: 42px;
  }
  .header-controls{
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-title{
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: lowercase;
  }
  .field{
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .field label{
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--fg);
    text-transform: lowercase;
  }
  select{
    background: transparent;
    color: var(--fg);
    border: none;
    border-bottom: 1px solid var(--border);
    font-family: inherit;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    padding: 2px 0;
    outline: none;
    text-transform: lowercase;
  }
  .conn{
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
  }
  .dot{
    width: 8px;
    height: 8px;
    border: 1px solid var(--border);
    border-radius: 50%;
    background: transparent;
    transition: transform 100ms ease;
  }
  .dot.on{
    background: var(--fg);
  }
  .dot.pulse{
    animation: ledBounce 400ms ease-out;
  }
  @keyframes ledBounce{
    0%{ transform: scale(1); }
    50%{ transform: scale(1.8); }
    100%{ transform: scale(1); }
  }
  .theme-toggle{
    font-size: 14px;
    line-height: 1;
    padding: 4px 8px;
    min-height: 0;
    min-width: 0;
    width: auto;
    height: auto;
  }

  /* ------------------------------------------------------------------ */
  /* buttons                                                             */
  /* ------------------------------------------------------------------ */
  .actions{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 8px;
    flex: 0 0 auto;
  }
  button{
    background: none;
    border: 1px solid var(--border);
    color: var(--fg);
    font-family: inherit;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    cursor: pointer;
    border-radius: 0;
    padding: 6px 12px;
    transition: background-color 100ms ease, color 100ms ease;
  }
  button:hover{
    background: var(--fg);
    color: var(--bg);
  }

  /* ------------------------------------------------------------------ */
  /* mode tabs / single-multi views                                      */
  /* ------------------------------------------------------------------ */
  .hidden{ display: none !important; }
  .mode-tabs{
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    flex: 0 0 auto;
  }
  .mode-tab{
    background: none;
    border: 1px solid var(--border);
    color: var(--fg);
    font-family: inherit;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    cursor: pointer;
    border-radius: 0;
    padding: 6px 12px;
    transition: background-color 100ms ease, color 100ms ease;
  }
  .mode-tab.active{
    background: var(--fg);
    color: var(--bg);
  }
  #singleView,
  #multiView{
    display: flex;
    flex-direction: column;
    flex: 1 1 auto;
    min-height: 0;
    gap: 8px;
  }

  /* ------------------------------------------------------------------ */
  /* multi mode                                                          */
  /* ------------------------------------------------------------------ */
  .multi-global{
    display: flex;
    align-items: flex-end;
    gap: 16px;
    flex-wrap: wrap;
    flex: 0 0 auto;
    border: 1px solid var(--border);
    background: var(--section-bg);
    padding: 12px 16px;
  }
  .part-list{
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
  }
  .part-row{
    border: 1px solid var(--border);
    background: var(--section-bg);
    border-left-width: 3px;
    border-left-style: solid;
    transition: opacity 200ms ease, background-color 200ms ease, border-color 200ms ease;
  }
  .part-row.disabled{
    opacity: 0.4;
  }
  .part-0{ border-left-color: #ffffff; }
  .part-1{ border-left-color: #aaaaaa; }
  .part-2{ border-left-color: #555555; }
  .part-3{ border-left-color: #dddddd; }
  html[data-theme="dark"] .part-0{ border-left-color: #ffffff; }
  html[data-theme="dark"] .part-1{ border-left-color: #999999; }
  html[data-theme="dark"] .part-2{ border-left-color: #555555; }
  html[data-theme="dark"] .part-3{ border-left-color: #cccccc; }
  .part-main{
    display: flex;
    align-items: flex-end;
    gap: 16px;
    flex-wrap: wrap;
    padding: 12px 16px;
  }
  .part-badge{
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    min-width: 22px;
    align-self: center;
  }
  .part-enable{
    padding: 4px 10px;
    font-size: 10px;
    align-self: center;
  }
  .part-main .field select,
  .part-main .field input[type="number"]{
    min-width: 56px;
  }
  input[type="number"]{
    background: transparent;
    color: var(--fg);
    border: none;
    border-bottom: 1px solid var(--border);
    font-family: inherit;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    padding: 2px 0;
    outline: none;
    width: 56px;
  }
  .key-display{
    font-family: "SF Mono", Menlo, Monaco, monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border);
    padding: 2px 4px;
    cursor: pointer;
    text-align: center;
    min-width: 40px;
    text-transform: lowercase;
  }
  .part-editor{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 0 16px 16px 16px;
    border-top: 1px solid var(--border);
  }
  .subsection{
    flex: 1 1 180px;
    min-width: 180px;
    border: 1px solid var(--border);
    padding: 12px;
  }
  .subsection h3{
    margin: 0 0 8px 0;
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    color: var(--fg);
  }

  /* ------------------------------------------------------------------ */
  /* section grid                                                        */
  /* ------------------------------------------------------------------ */
  .grid{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }
  .section-osc,
  .section-lib{
    grid-column: 1 / -1;
  }
  @media (orientation: landscape) and (min-width: 900px){
    html, body{
      height: 100%;
      overflow: hidden;
    }
    body{
      display: flex;
      flex-direction: column;
    }
    .grid{
      grid-template-columns: repeat(4, 1fr);
      flex: 1 1 auto;
      min-height: 0;
    }
    .section{
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .section .knobs{
      flex: 1 1 auto;
      align-content: center;
    }
    .section-osc .knobs{
      flex-wrap: nowrap;
      justify-content: space-between;
    }
    .section-lib .lib-list{
      flex: 1 1 auto;
      max-height: none;
    }
  }
  .section{
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--section-bg);
    padding: 16px;
    border-radius: 0;
    transition: background-color 200ms ease, border-color 200ms ease;
  }
  .section::after{
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    top: -2px;
    height: 2px;
    background: var(--fg);
    opacity: 0;
    pointer-events: none;
  }
  .section:hover::after{
    animation: scan 600ms linear;
  }
  @keyframes scan{
    0%{ top: 0; opacity: 0.6; }
    100%{ top: 100%; opacity: 0; }
  }
  .section h2{
    margin: 0 0 16px 0;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    color: var(--fg);
  }

  /* ------------------------------------------------------------------ */
  /* knobs                                                               */
  /* ------------------------------------------------------------------ */
  .knobs{
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
  }
  .section-filter .knobs,
  .section-amp .knobs,
  .section-fx .knobs{
    flex-wrap: nowrap;
    justify-content: space-between;
    gap: 8px;
  }
  .section-filter .knob-container,
  .section-amp .knob-container,
  .section-fx .knob-container{
    width: 56px;
  }
  .knob-container{
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 68px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .knob-svg{
    cursor: ns-resize;
    width: 52px;
    height: 52px;
  }
  .knob-indicator{
    transform-origin: 50% 50%;
  }
  .knob-label{
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    margin-top: 4px;
    color: var(--fg);
    white-space: nowrap;
  }
  .knob-value{
    font-family: "SF Mono", Menlo, Monaco, monospace;
    font-size: 13px;
    font-weight: 700;
    margin-top: 2px;
    color: var(--fg);
    cursor: pointer;
    min-height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ripple-dot{
    position: absolute;
    left: 50%;
    top: 50%;
    width: 4px;
    height: 4px;
    margin: -2px 0 0 -2px;
    border-radius: 50%;
    background: var(--fg);
    pointer-events: none;
    animation: rippleOut 400ms ease-out forwards;
  }
  @keyframes rippleOut{
    from{ transform: translate(0, 0) scale(1); opacity: 0.8; }
    to{ transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
  }

  /* ------------------------------------------------------------------ */
  /* patch library                                                       */
  /* ------------------------------------------------------------------ */
  .lib-row{
    display: flex;
    flex-wrap: nowrap;
    gap: 12px;
    align-items: center;
    margin-bottom: 8px;
    flex: 0 0 auto;
  }
  input[type="text"]{
    flex: 1;
    min-width: 140px;
    background: transparent;
    color: var(--fg);
    border: none;
    border-bottom: 1px solid var(--border);
    font-family: inherit;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    padding: 4px 0;
    outline: none;
    text-transform: lowercase;
  }
  .lib-list{
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 200px;
    overflow-y: auto;
  }
  .lib-item{
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    gap: 8px;
  }
  .lib-item .name{
    letter-spacing: 0.05em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lib-item .btns{ display: flex; gap: 8px; flex: 0 0 auto; }
  .lib-item button{ padding: 4px 10px; }
  input[type="file"]{ display: none; }
  .small{ font-size: 10px; color: var(--fg); opacity: 0.5; letter-spacing: 0.05em; }

  /* ------------------------------------------------------------------ */
  /* iPad 11" (1194x834 landscape / 834x1194 portrait)                   */
  /* ------------------------------------------------------------------ */
  @media (min-width: 768px){
    body{
      font-size: 14px;
      background-size: 10px 10px;
      padding: 16px 24px;
    }
    .header-title{
      font-size: 14px;
    }
    .section{
      padding: 24px;
    }
    .knob-label{
      font-size: 13px;
    }
    .knob-value{
      min-width: 44px;
      min-height: 44px;
      font-size: 15px;
    }
    button{
      min-height: 44px;
      padding: 12px 24px;
      font-size: 13px;
    }
    select{
      min-height: 44px;
      font-size: 13px;
    }
    .lib-item button{
      min-height: 44px;
      min-width: 44px;
    }
  }
</style>
</head>
<body>

<div class="header">
  <canvas class="header-display" id="visualizer"></canvas>
  <div class="header-bar">
    <div class="header-title">virus ti snow</div>
    <div class="header-controls">
      <div class="field">
        <label>output</label>
        <select id="midiOutSelect"><option value="">none</option></select>
      </div>
      <div class="field">
        <label>channel</label>
        <select id="midiChannel"></select>
      </div>
      <div class="conn">
        <span class="dot" id="connDot"></span>
        <span id="connLabel">disconnected</span>
      </div>
      <button class="theme-toggle" id="themeToggle">○</button>
    </div>
  </div>
</div>

<div class="mode-tabs">
  <button class="mode-tab active" id="tabSingle" data-mode="single">single</button>
  <button class="mode-tab" id="tabMulti" data-mode="multi">multi</button>
</div>

<div id="singleView">
  <div class="actions">
    <button id="btnRandomize">randomize</button>
    <button id="btnInit">init</button>
    <button id="btnExport">export .syx</button>
    <button id="btnImport">import .syx</button>
    <input type="file" id="fileInput" accept=".syx">
  </div>

  <div class="grid" id="sectionsContainer"></div>
</div>

<div id="multiView" class="hidden">
  <div class="multi-global">
    <div class="field">
      <label>play mode</label>
      <select id="playModeSelect">
        <option value="0">single</option>
        <option value="1">multi</option>
      </select>
    </div>
    <div class="field">
      <label>multi program</label>
      <input type="number" id="multiProgramInput" min="0" max="127" value="0">
    </div>
    <button id="btnMultiLoad">load</button>
    <button id="btnMultiSave">save</button>
  </div>

  <div class="part-list" id="partList"></div>
</div>

<script>
(function(){
  // ---------------------------------------------------------------------
  // Parameter definitions: Virus TI parameter numbers per spec
  // SysEx format: F0 00 20 33 01 [DeviceID] 01 [param] [value] F7
  // ---------------------------------------------------------------------
  const SECTIONS = [
    { key: 'osc',    title: 'oscillators' },
    { key: 'filter', title: 'filter 1' },
    { key: 'amp',    title: 'amplifier' },
    { key: 'lfo',    title: 'lfo 1' },
    { key: 'fx',     title: 'effects' },
  ];

  const PARAMS = [
    // Oscillator 1
    { id:'osc1_wave',       name:'Osc1 Waveform',     short:'o1wv', section:'osc', cc:17, default:0 },
    { id:'osc1_pw',         name:'Osc1 Pulsewidth',   short:'o1pw', section:'osc', cc:18, default:64 },
    { id:'osc1_waveselect', name:'Osc1 Wave Select',  short:'o1ws', section:'osc', cc:19, default:0 },
    { id:'osc1_semitone',   name:'Osc1 Semitone',     short:'o1st', section:'osc', cc:20, default:64, bipolar:true },
    // Oscillator 2
    { id:'osc2_wave',       name:'Osc2 Waveform',     short:'o2wv', section:'osc', cc:22, default:0 },
    { id:'osc2_pw',         name:'Osc2 Pulsewidth',   short:'o2pw', section:'osc', cc:23, default:64 },
    { id:'osc2_waveselect', name:'Osc2 Wave Select',  short:'o2ws', section:'osc', cc:24, default:0 },
    { id:'osc2_semitone',   name:'Osc2 Semitone',     short:'o2st', section:'osc', cc:25, default:64, bipolar:true },
    // Shared detune (Osc1/Osc2)
    { id:'osc_detune',      name:'Osc Detune',        short:'det',  section:'osc', cc:26, default:0 },

    // Filter 1
    { id:'f1_cutoff',    name:'Cutoff',            short:'cutt', section:'filter', cc:40, default:127 },
    { id:'f1_resonance', name:'Resonance',         short:'res',  section:'filter', cc:42, default:0 },
    { id:'f1_envamount', name:'Env Amount',        short:'env',  section:'filter', cc:44, default:64, bipolar:true },
    { id:'f1_keytrack',  name:'Keyboard Track',    short:'key',  section:'filter', cc:46, default:0 },

    // Amplifier
    { id:'amp_attack',  name:'Attack',  short:'atk', section:'amp', cc:59, default:0 },
    { id:'amp_decay',   name:'Decay',   short:'dcy', section:'amp', cc:60, default:0 },
    { id:'amp_sustain', name:'Sustain', short:'sus', section:'amp', cc:61, default:127 },
    { id:'amp_release', name:'Release', short:'rel', section:'amp', cc:63, default:0 },

    // LFO 1
    { id:'lfo1_rate',  name:'Rate',  short:'rate', section:'lfo', cc:67, default:64 },
    { id:'lfo1_shape', name:'Shape', short:'shp',  section:'lfo', cc:68, default:0 },

    // Effects
    { id:'fx_chorus_mix',      name:'Chorus Mix',      short:'chmx', section:'fx', cc:105, default:0 },
    { id:'fx_chorus_rate',     name:'Chorus Rate',     short:'chrt', section:'fx', cc:106, default:64 },
    { id:'fx_delay_time',      name:'Delay Time',      short:'dlt',  section:'fx', cc:114, default:0 },
    { id:'fx_delay_feedback',  name:'Delay Feedback',  short:'dlfb', section:'fx', cc:115, default:0 },
  ];

  const SYSEX_PREFIX = [0xF0, 0x00, 0x20, 0x33, 0x01];
  const SYSEX_CMD_PARAM = 0x01; // single parameter change

  // ---------------------------------------------------------------------
  // Multi mode: 4 parts, each with its own mixer/MIDI settings (page C)
  // and its own full sound (oscillator/filter/amp/lfo/fx).
  // Per-part param SysEx: F0 00 20 33 01 [DeviceID] 72 [part 00-03] [param] [value] F7
  // ---------------------------------------------------------------------
  const NUM_PARTS = 4;
  const SYSEX_CMD_MULTI = 0x72;  // page C: per-part mixer params
  const SYSEX_CMD_STORE = 0x70;  // store/write request
  const PART_ENABLE_PARAM = 0xC0;

  const PART_PARAMS = [
    { id:'channel',   name:'MIDI Channel', short:'ch',   cc:34,  kind:'channel', default:0 },
    { id:'volume',    name:'Volume',       short:'vol',  cc:39,  kind:'knob',    default:127 },
    { id:'bank',      name:'Bank',         short:'bank', cc:31,  kind:'bank',    default:0 },
    { id:'program',   name:'Program',      short:'prg',  cc:33,  kind:'program', default:0 },
    { id:'lowkey',    name:'Low Key',      short:'low',  cc:35,  kind:'key',     default:0 },
    { id:'highkey',   name:'High Key',     short:'high', cc:36,  kind:'key',     default:127 },
    { id:'transpose', name:'Transpose',    short:'trsp', cc:37,  kind:'knob',    default:64, bipolar:true },
    { id:'detune',    name:'Detune',       short:'dtun', cc:38,  kind:'knob',    default:64, bipolar:true },
    { id:'output',    name:'Output',       short:'out',  cc:41,  kind:'output',  default:0 },
  ];

  const BANK_NAMES = ['a', 'b', 'c', 'd'];
  const OUTPUT_NAMES = ['out1 l', 'out1 l+r', 'out1 r', 'out2 l', 'out2 l+r', 'out2 r'];
  const NOTE_NAMES = ['c', 'c#', 'd', 'd#', 'e', 'f', 'f#', 'g', 'g#', 'a', 'a#', 'b'];

  function noteName(value){
    const octave = Math.floor(value / 12) - 1; // MIDI 0 -> c-1
    return NOTE_NAMES[value % 12] + octave;
  }

  // ---------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------
  const patch = {};
  PARAMS.forEach(p => { patch[p.id] = p.default; });

  // multiParts[i] = { enabled, values: {per-part mixer params}, sound: {per-part PARAMS} }
  const multiParts = [];
  for (let i = 0; i < NUM_PARTS; i++){
    const values = {};
    PART_PARAMS.forEach(pp => { values[pp.id] = pp.default; });
    const sound = {};
    PARAMS.forEach(p => { sound[p.id] = p.default; });
    multiParts.push({ enabled: true, values, sound });
  }

  let midiAccess = null;
  let selectedOutput = null;
  let wasConnected = false;

  const LIB_KEY = 'virusTiSnow_patchLibrary';
  const THEME_KEY = 'virusTiSnow_theme';

  // ---------------------------------------------------------------------
  // Theme toggle (persisted in localStorage)
  // ---------------------------------------------------------------------
  const themeToggle = document.getElementById('themeToggle');

  function applyTheme(theme){
    if (theme === 'dark'){
      document.documentElement.setAttribute('data-theme', 'dark');
      themeToggle.textContent = '●'; // ●
    } else {
      document.documentElement.removeAttribute('data-theme');
      themeToggle.textContent = '○'; // ○
    }
  }

  let currentTheme = localStorage.getItem(THEME_KEY) || 'light';
  applyTheme(currentTheme);

  themeToggle.addEventListener('click', () => {
    currentTheme = (currentTheme === 'light') ? 'dark' : 'light';
    localStorage.setItem(THEME_KEY, currentTheme);
    applyTheme(currentTheme);
  });

  // ---------------------------------------------------------------------
  // Header visualizer — OP-XY style scrolling piano-roll dot matrix.
  // 40x8 grid of dots scrolling right-to-left. New columns are generated
  // as a musical sequence (pentatonic rows). Speed/density react to the
  // MIDI connection state. Canvas + requestAnimationFrame for 60fps.
  // ---------------------------------------------------------------------
  const visualizer = document.getElementById('visualizer');
  const vctx = visualizer.getContext('2d');

  const VIS_DOT = 8;       // dot diameter
  const VIS_GAP = 3;       // gap between dots
  const VIS_CELL = VIS_DOT + VIS_GAP; // 11px per cell

  let VIS_COLS = 1;        // grid columns (computed from canvas width)
  let VIS_ROWS = 1;        // grid rows (computed from canvas height)
  let PENTA_ROWS = [0];    // pentatonic-ish row positions for a musical feel

  let visDPR = 1;
  let visW = 0, visH = 0;

  // grid[col] = array of active row indices for that column
  const grid = [];
  let melodyStep = 0;       // walks up/down the pentatonic scale
  let melodyDir = 1;

  function computePentaRows(rows){
    const arr = [];
    for (let i = 0; i < rows; i++){
      if (i % 7 !== 2 && i % 7 !== 5) arr.push(i);
    }
    if (arr.length === 0) arr.push(0);
    return arr;
  }

  function generateColumn(){
    const connected = wasConnected;
    // density: 1 dot when disconnected, 2-3 when connected
    const count = connected ? (2 + (Math.random() < 0.5 ? 0 : 1)) : 1;

    // melodic walk: advance the base step up/down the pentatonic scale
    melodyStep += melodyDir;
    if (melodyStep >= PENTA_ROWS.length - 1){ melodyStep = PENTA_ROWS.length - 1; melodyDir = -1; }
    if (melodyStep <= 0){ melodyStep = 0; melodyDir = 1; }
    // occasionally jump for variety
    if (Math.random() < 0.15){
      melodyStep = Math.floor(Math.random() * PENTA_ROWS.length);
    }

    const rows = new Set();
    rows.add(PENTA_ROWS[melodyStep]);
    // add harmony notes (thirds/fifths within the pentatonic set)
    while (rows.size < count && rows.size < PENTA_ROWS.length){
      const offset = 1 + Math.floor(Math.random() * 2); // a third or fifth up
      const idx = (melodyStep + offset) % PENTA_ROWS.length;
      rows.add(PENTA_ROWS[idx]);
    }
    return [...rows];
  }

  function resizeVisualizer(){
    const rect = visualizer.getBoundingClientRect();
    visDPR = window.devicePixelRatio || 1;
    visW = Math.max(1, Math.floor(rect.width));
    visH = Math.max(1, Math.floor(rect.height));
    visualizer.width = visW * visDPR;
    visualizer.height = visH * visDPR;
    vctx.setTransform(visDPR, 0, 0, visDPR, 0, 0);

    const newCols = Math.max(1, Math.floor((visW + VIS_GAP) / VIS_CELL));
    const newRows = Math.max(1, Math.floor((visH + VIS_GAP) / VIS_CELL));
    if (newCols !== VIS_COLS || newRows !== VIS_ROWS){
      VIS_COLS = newCols;
      VIS_ROWS = newRows;
      PENTA_ROWS = computePentaRows(VIS_ROWS);
      melodyStep = Math.min(melodyStep, PENTA_ROWS.length - 1);
      grid.length = 0;
      for (let c = 0; c < VIS_COLS; c++){ grid.push(generateColumn()); }
    }
  }

  function dotColors(){
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    return dark
      ? { active: '#ffffff', inactive: '#333333' }
      : { active: '#000000', inactive: '#dddddd' };
  }

  let lastStep = 0;
  function stepInterval(){
    return wasConnected ? 80 : 120; // ms per column (faster when connected)
  }

  function renderVisualizer(t){
    // advance the scroll on a musical clock
    if (t - lastStep >= stepInterval()){
      lastStep = t;
      grid.shift();
      grid.push(generateColumn());
    }

    vctx.clearRect(0, 0, visW, visH);
    const colors = dotColors();
    // center the 40x8 grid in the canvas
    const gridW = VIS_COLS * VIS_CELL - VIS_GAP;
    const gridH = VIS_ROWS * VIS_CELL - VIS_GAP;
    const x0 = Math.max(0, (visW - gridW) / 2);
    const y0 = Math.max(0, (visH - gridH) / 2);
    const r = VIS_DOT / 2;

    for (let c = 0; c < VIS_COLS; c++){
      const activeRows = grid[c] || [];
      const cx = x0 + c * VIS_CELL + r;
      for (let row = 0; row < VIS_ROWS; row++){
        const isActive = activeRows.indexOf(row) !== -1;
        const cy = y0 + row * VIS_CELL + r;
        vctx.beginPath();
        vctx.arc(cx, cy, r, 0, Math.PI * 2);
        if (isActive){
          vctx.fillStyle = colors.active;
          vctx.globalAlpha = 1;
        } else {
          vctx.fillStyle = colors.inactive;
          vctx.globalAlpha = 0.3;
        }
        vctx.fill();
      }
    }
    vctx.globalAlpha = 1;
    requestAnimationFrame(renderVisualizer);
  }

  resizeVisualizer();
  window.addEventListener('resize', resizeVisualizer);
  requestAnimationFrame(resizeVisualizer);
  requestAnimationFrame(renderVisualizer);

  // ---------------------------------------------------------------------
  // MIDI setup
  // ---------------------------------------------------------------------
  const outSelect = document.getElementById('midiOutSelect');
  const chanSelect = document.getElementById('midiChannel');
  const connDot = document.getElementById('connDot');
  const connLabel = document.getElementById('connLabel');

  for (let i = 1; i <= 16; i++){
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = 'channel ' + i;
    chanSelect.appendChild(opt);
  }
  chanSelect.value = 1;

  function flashConnected(){
    connDot.classList.remove('pulse');
    // force reflow so the animation can restart
    void connDot.offsetWidth;
    connDot.classList.add('pulse');

    visualizer.classList.remove('flash');
    void visualizer.offsetWidth;
    visualizer.classList.add('flash');
    setTimeout(() => visualizer.classList.remove('flash'), 500);
  }

  function updateConnectionIndicator(){
    const isConnected = !!(selectedOutput && selectedOutput.state === 'connected');
    if (isConnected){
      connDot.classList.add('on');
      connLabel.textContent = 'connected: ' + selectedOutput.name;
      if (!wasConnected) flashConnected();
    } else {
      connDot.classList.remove('on');
      connLabel.textContent = 'disconnected';
    }
    wasConnected = isConnected;
  }

  function refreshOutputs(){
    const prev = outSelect.value;
    outSelect.innerHTML = '<option value="">none</option>';
    if (!midiAccess) return;
    midiAccess.outputs.forEach(output => {
      const opt = document.createElement('option');
      opt.value = output.id;
      opt.textContent = output.name;
      outSelect.appendChild(opt);
    });
    if (prev && [...outSelect.options].some(o => o.value === prev)){
      outSelect.value = prev;
    }
    onOutputChange();
  }

  function onOutputChange(){
    const id = outSelect.value;
    selectedOutput = (midiAccess && id) ? midiAccess.outputs.get(id) : null;
    updateConnectionIndicator();
  }

  outSelect.addEventListener('change', onOutputChange);

  if (navigator.requestMIDIAccess){
    navigator.requestMIDIAccess({ sysex: true }).then(access => {
      midiAccess = access;
      refreshOutputs();
      midiAccess.onstatechange = refreshOutputs;
    }).catch(err => {
      connLabel.textContent = 'midi unavailable';
      console.error(err);
    });
  } else {
    connLabel.textContent = 'web midi not supported';
  }

  // ---------------------------------------------------------------------
  // SysEx send
  // ---------------------------------------------------------------------
  function deviceId(){
    return parseInt(chanSelect.value, 10) - 1; // 0-15
  }

  function buildSysEx(cc, value){
    return new Uint8Array([
      ...SYSEX_PREFIX,
      deviceId(),
      SYSEX_CMD_PARAM,
      cc & 0x7F,
      value & 0x7F,
      0xF7
    ]);
  }

  function sendParam(param, value){
    if (selectedOutput){
      try{
        selectedOutput.send(buildSysEx(param.cc, value));
      } catch(e){ console.error('MIDI send error', e); }
    }
  }

  function sendFullPatch(p){
    PARAMS.forEach((param, i) => {
      setTimeout(() => sendParam(param, p[param.id]), i * 15);
    });
  }

  // ---------------------------------------------------------------------
  // Multi mode SysEx send
  // ---------------------------------------------------------------------
  function sendMultiPartParam(partIndex, cc, value){
    if (selectedOutput){
      try{
        selectedOutput.send(new Uint8Array([
          ...SYSEX_PREFIX, deviceId(), SYSEX_CMD_MULTI, partIndex & 0x7F, cc & 0x7F, value & 0x7F, 0xF7
        ]));
      } catch(e){ console.error('MIDI send error', e); }
    }
  }

  // per-part full sound editor: addresses the part via the device-id byte
  function sendPartSoundParam(partIndex, cc, value){
    if (selectedOutput){
      try{
        selectedOutput.send(new Uint8Array([
          ...SYSEX_PREFIX, partIndex & 0x7F, SYSEX_CMD_PARAM, cc & 0x7F, value & 0x7F, 0xF7
        ]));
      } catch(e){ console.error('MIDI send error', e); }
    }
  }

  // ---------------------------------------------------------------------
  // Knob UI — thin-stroke circle with a single radial indicator line
  // showing the current value (-135deg to +135deg sweep, 0deg = up).
  // ---------------------------------------------------------------------
  const svgNS = 'http://www.w3.org/2000/svg';
  const KNOB_SIZE = 52;
  const KNOB_CENTER = KNOB_SIZE / 2;
  const KNOB_RADIUS = 21;

  function angleForValue(value){
    return -135 + (value / 127) * 270;
  }

  function displayValue(value, bipolar){
    if (bipolar) {
      const v = value - 64;
      return (v > 0 ? '+' : '') + v;
    }
    return String(value);
  }

  // spawn a brief ripple of dots radiating outward from a knob
  function spawnRipple(container){
    const RIPPLE_COUNT = 8;
    for (let i = 0; i < RIPPLE_COUNT; i++){
      const angle = (i / RIPPLE_COUNT) * Math.PI * 2;
      const dot = document.createElement('div');
      dot.className = 'ripple-dot';
      dot.style.setProperty('--dx', (Math.cos(angle) * 28) + 'px');
      dot.style.setProperty('--dy', (Math.sin(angle) * 28) + 'px');
      container.appendChild(dot);
      setTimeout(() => dot.remove(), 450);
    }
  }

  // generic knob: caller supplies getValue/setValue so the same widget can
  // back the single-mode patch, or any per-part value in multi mode.
  function createKnobGeneric(opts){
    const container = document.createElement('div');
    container.className = 'knob-container';

    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', `0 0 ${KNOB_SIZE} ${KNOB_SIZE}`);
    svg.classList.add('knob-svg');

    // thin stroke circle, no fill
    const circle = document.createElementNS(svgNS, 'circle');
    circle.setAttribute('cx', KNOB_CENTER);
    circle.setAttribute('cy', KNOB_CENTER);
    circle.setAttribute('r', KNOB_RADIUS);
    circle.setAttribute('fill', 'none');
    circle.setAttribute('stroke', 'currentColor');
    circle.setAttribute('stroke-width', '0.5');
    svg.appendChild(circle);

    // single thin line from center to edge, rotated to show the value
    const indicator = document.createElementNS(svgNS, 'g');
    indicator.classList.add('knob-indicator');
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', KNOB_CENTER);
    line.setAttribute('y1', KNOB_CENTER);
    line.setAttribute('x2', KNOB_CENTER);
    line.setAttribute('y2', KNOB_CENTER - KNOB_RADIUS);
    line.setAttribute('stroke', 'currentColor');
    line.setAttribute('stroke-width', '1');
    indicator.appendChild(line);
    svg.appendChild(indicator);

    svg.style.color = 'var(--fg)';

    const label = document.createElement('div');
    label.className = 'knob-label';
    label.textContent = opts.label;

    const valueLabel = document.createElement('div');
    valueLabel.className = 'knob-value';

    container.appendChild(svg);
    container.appendChild(label);
    container.appendChild(valueLabel);

    function render(){
      const value = opts.getValue();
      indicator.style.transform = `rotate(${angleForValue(value)}deg)`;
      valueLabel.textContent = displayValue(value, opts.bipolar);
    }

    function setValue(value, send, setOpts){
      value = Math.max(0, Math.min(127, Math.round(value)));
      const changed = opts.getValue() !== value;
      opts.setValue(value, send);
      render();
      if (changed && !(setOpts && setOpts.silent)) spawnRipple(container);
    }

    // drag interaction
    let dragging = false;
    let startY = 0;
    let startVal = 0;

    svg.addEventListener('pointerdown', (e) => {
      dragging = true;
      startY = e.clientY;
      startVal = opts.getValue();
      svg.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    svg.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dy = startY - e.clientY;
      setValue(startVal + dy * 0.7, true);
    });

    function endDrag(e){
      dragging = false;
    }
    svg.addEventListener('pointerup', endDrag);
    svg.addEventListener('pointercancel', endDrag);

    // double-click resets to default
    svg.addEventListener('dblclick', () => {
      setValue(opts.default, true);
    });

    // tap/click the value box to type an exact value
    valueLabel.addEventListener('click', () => {
      const current = opts.getValue();
      const input = prompt('value (0-127):', current);
      if (input === null) return;
      const num = parseInt(input, 10);
      if (!isNaN(num)) setValue(num, true);
    });

    container._render = render;
    container._setValue = setValue;
    render();

    return container;
  }

  function createKnob(param){
    return createKnobGeneric({
      label: param.short || param.name,
      default: param.default,
      bipolar: param.bipolar,
      getValue: () => patch[param.id],
      setValue: (value, send) => {
        patch[param.id] = value;
        if (send) sendParam(param, value);
      }
    });
  }

  // ---------------------------------------------------------------------
  // Build sections
  // ---------------------------------------------------------------------
  const knobRefs = {}; // id -> container element
  const allKnobsInOrder = [];

  function buildSections(){
    const root = document.getElementById('sectionsContainer');
    root.innerHTML = '';
    SECTIONS.forEach(sec => {
      const div = document.createElement('div');
      div.className = 'section section-' + sec.key;
      const h2 = document.createElement('h2');
      h2.textContent = sec.title;
      div.appendChild(h2);

      const knobs = document.createElement('div');
      knobs.className = 'knobs';

      PARAMS.filter(p => p.section === sec.key).forEach(param => {
        const knob = createKnob(param);
        knobRefs[param.id] = knob;
        allKnobsInOrder.push(knob);
        knobs.appendChild(knob);
      });

      div.appendChild(knobs);
      root.appendChild(div);
    });

    // patch library section
    const libSection = document.createElement('div');
    libSection.className = 'section section-lib';
    const libTitle = document.createElement('h2');
    libTitle.textContent = 'patch library';
    libSection.appendChild(libTitle);

    const libRow = document.createElement('div');
    libRow.className = 'lib-row';
    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.id = 'patchName';
    nameInput.placeholder = 'patch name';
    const saveBtn = document.createElement('button');
    saveBtn.id = 'btnSavePatch';
    saveBtn.textContent = 'save';
    libRow.appendChild(nameInput);
    libRow.appendChild(saveBtn);
    libSection.appendChild(libRow);

    const libList = document.createElement('div');
    libList.className = 'lib-list';
    libList.id = 'libList';
    libSection.appendChild(libList);

    root.appendChild(libSection);

    saveBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name){
        alert('enter a patch name');
        return;
      }
      const lib = loadLibrary();
      lib[name] = { ...patch };
      saveLibrary(lib);
      nameInput.value = '';
      renderLibrary();
    });
  }

  function refreshAllKnobs(){
    PARAMS.forEach(p => knobRefs[p.id]._render());
  }

  function applyPatchObject(p, send){
    PARAMS.forEach(param => {
      const value = (p[param.id] !== undefined) ? p[param.id] : param.default;
      patch[param.id] = Math.max(0, Math.min(127, value));
    });
    refreshAllKnobs();
    if (send) sendFullPatch(patch);
  }

  // smoothly animate every knob's indicator with the same transition
  function animateAllKnobs(duration){
    allKnobsInOrder.forEach(knob => {
      const indicator = knob.querySelector('.knob-indicator');
      indicator.style.transition = `transform ${duration}ms ease-in-out`;
    });
    setTimeout(() => {
      allKnobsInOrder.forEach(knob => {
        knob.querySelector('.knob-indicator').style.transition = '';
      });
    }, duration + 50);
  }

  // animate knobs in a left-to-right cascade (used by randomize)
  function animateCascade(stepDuration, stagger){
    allKnobsInOrder.forEach((knob, i) => {
      const indicator = knob.querySelector('.knob-indicator');
      indicator.style.transition = `transform ${stepDuration}ms ease-out`;
      indicator.style.transitionDelay = (i * stagger) + 'ms';
    });
    const total = stepDuration + allKnobsInOrder.length * stagger + 50;
    setTimeout(() => {
      allKnobsInOrder.forEach(knob => {
        const indicator = knob.querySelector('.knob-indicator');
        indicator.style.transition = '';
        indicator.style.transitionDelay = '';
      });
    }, total);
  }

  // ---------------------------------------------------------------------
  // Buttons: Randomize / Init
  // ---------------------------------------------------------------------
  document.getElementById('btnRandomize').addEventListener('click', () => {
    animateCascade(150, 30);
    const newPatch = {};
    PARAMS.forEach(p => { newPatch[p.id] = Math.floor(Math.random() * 128); });
    applyPatchObject(newPatch, true);
  });

  document.getElementById('btnInit').addEventListener('click', () => {
    animateAllKnobs(300);
    const newPatch = {};
    PARAMS.forEach(p => { newPatch[p.id] = p.default; });
    applyPatchObject(newPatch, true);
  });

  // ---------------------------------------------------------------------
  // Export / Import .syx
  // ---------------------------------------------------------------------
  document.getElementById('btnExport').addEventListener('click', () => {
    const bytes = [];
    PARAMS.forEach(param => {
      bytes.push(...buildSysEx(param.cc, patch[param.id]));
    });
    const blob = new Blob([new Uint8Array(bytes)], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'virus_ti_patch.syx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  const fileInput = document.getElementById('fileInput');
  document.getElementById('btnImport').addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const bytes = new Uint8Array(reader.result);
      const newPatch = {};
      let i = 0;
      while (i < bytes.length){
        if (bytes[i] === 0xF0){
          // find matching F7
          let j = i + 1;
          while (j < bytes.length && bytes[j] !== 0xF7) j++;
          if (j < bytes.length){
            const msg = bytes.slice(i, j + 1);
            // Expect: F0 00 20 33 01 [DeviceID] 01 [param] [value] F7
            if (msg.length === 10 &&
                msg[1] === 0x00 && msg[2] === 0x20 && msg[3] === 0x33 &&
                msg[4] === 0x01 && msg[6] === 0x01){
              const cc = msg[7];
              const value = msg[8];
              const param = PARAMS.find(p => p.cc === cc);
              if (param) newPatch[param.id] = value;
            }
            i = j + 1;
            continue;
          }
        }
        i++;
      }
      animateAllKnobs(300);
      applyPatchObject(newPatch, true);
    };
    reader.readAsArrayBuffer(file);
    fileInput.value = '';
  });

  // ---------------------------------------------------------------------
  // Patch library (localStorage)
  // ---------------------------------------------------------------------
  function loadLibrary(){
    try{
      return JSON.parse(localStorage.getItem(LIB_KEY)) || {};
    } catch(e){ return {}; }
  }

  function saveLibrary(lib){
    localStorage.setItem(LIB_KEY, JSON.stringify(lib));
  }

  function renderLibrary(){
    const lib = loadLibrary();
    const list = document.getElementById('libList');
    list.innerHTML = '';
    const names = Object.keys(lib).sort();
    if (names.length === 0){
      const empty = document.createElement('div');
      empty.className = 'small';
      empty.textContent = 'no patches saved';
      list.appendChild(empty);
      return;
    }
    names.forEach(name => {
      const item = document.createElement('div');
      item.className = 'lib-item';

      const nameEl = document.createElement('span');
      nameEl.className = 'name';
      nameEl.textContent = name;

      const btns = document.createElement('div');
      btns.className = 'btns';

      const loadBtn = document.createElement('button');
      loadBtn.textContent = 'load';
      loadBtn.addEventListener('click', () => {
        animateAllKnobs(300);
        applyPatchObject(lib[name], true);
      });

      const delBtn = document.createElement('button');
      delBtn.textContent = 'delete';
      delBtn.addEventListener('click', () => {
        if (confirm(`delete patch "${name}"?`)){
          delete lib[name];
          saveLibrary(lib);
          renderLibrary();
        }
      });

      btns.appendChild(loadBtn);
      btns.appendChild(delBtn);
      item.appendChild(nameEl);
      item.appendChild(btns);
      list.appendChild(item);
    });
  }

  // ---------------------------------------------------------------------
  // Multi mode UI — single | multi tabs, 4 part strips
  // ---------------------------------------------------------------------
  function clamp7(value){
    return Math.max(0, Math.min(127, Math.round(value)));
  }

  function createPartKnob(partIndex, pp){
    return createKnobGeneric({
      label: pp.short || pp.name,
      default: pp.default,
      bipolar: pp.bipolar,
      getValue: () => multiParts[partIndex].values[pp.id],
      setValue: (value, send) => {
        multiParts[partIndex].values[pp.id] = value;
        if (send) sendMultiPartParam(partIndex, pp.cc, value);
      }
    });
  }

  function createPartSoundKnob(partIndex, param){
    return createKnobGeneric({
      label: param.short || param.name,
      default: param.default,
      bipolar: param.bipolar,
      getValue: () => multiParts[partIndex].sound[param.id],
      setValue: (value, send) => {
        multiParts[partIndex].sound[param.id] = value;
        if (send) sendPartSoundParam(partIndex, param.cc, value);
      }
    });
  }

  function createKeyField(partIndex, pp){
    const field = document.createElement('div');
    field.className = 'field';
    const label = document.createElement('label');
    label.textContent = pp.short || pp.name;
    const display = document.createElement('div');
    display.className = 'key-display';
    display.textContent = noteName(multiParts[partIndex].values[pp.id]);
    display.addEventListener('click', () => {
      const current = multiParts[partIndex].values[pp.id];
      const input = prompt('value (0-127):', current);
      if (input === null) return;
      const num = parseInt(input, 10);
      if (isNaN(num)) return;
      const value = clamp7(num);
      multiParts[partIndex].values[pp.id] = value;
      display.textContent = noteName(value);
      sendMultiPartParam(partIndex, pp.cc, value);
    });
    field.appendChild(label);
    field.appendChild(display);
    return field;
  }

  function createSelectField(labelText, options, value, onChange){
    const field = document.createElement('div');
    field.className = 'field';
    const label = document.createElement('label');
    label.textContent = labelText;
    const select = document.createElement('select');
    options.forEach((opt, i) => {
      const o = document.createElement('option');
      o.value = i;
      o.textContent = opt;
      select.appendChild(o);
    });
    select.value = value;
    select.addEventListener('change', () => onChange(parseInt(select.value, 10)));
    field.appendChild(label);
    field.appendChild(select);
    return field;
  }

  function createPartRow(index){
    const part = multiParts[index];

    const row = document.createElement('div');
    row.className = 'part-row part-' + index;
    if (!part.enabled) row.classList.add('disabled');

    const main = document.createElement('div');
    main.className = 'part-main';

    const badge = document.createElement('div');
    badge.className = 'part-badge';
    badge.textContent = 'p' + (index + 1);
    main.appendChild(badge);

    const enableBtn = document.createElement('button');
    enableBtn.className = 'part-enable';
    enableBtn.textContent = part.enabled ? 'on' : 'off';
    enableBtn.addEventListener('click', () => {
      part.enabled = !part.enabled;
      enableBtn.textContent = part.enabled ? 'on' : 'off';
      row.classList.toggle('disabled', !part.enabled);
      sendMultiPartParam(index, PART_ENABLE_PARAM, part.enabled ? 1 : 0);
    });
    main.appendChild(enableBtn);

    // MIDI channel
    const channels = [];
    for (let c = 1; c <= 16; c++) channels.push(String(c));
    main.appendChild(createSelectField('ch', channels, part.values.channel, (v) => {
      part.values.channel = v;
      sendMultiPartParam(index, 34, v);
    }));

    // volume knob
    main.appendChild(createPartKnob(index, PART_PARAMS.find(p => p.id === 'volume')));

    // bank select
    main.appendChild(createSelectField('bank', BANK_NAMES, part.values.bank, (v) => {
      part.values.bank = v;
      sendMultiPartParam(index, 31, v);
    }));

    // program change number input
    const progField = document.createElement('div');
    progField.className = 'field';
    const progLabel = document.createElement('label');
    progLabel.textContent = 'prg';
    const progInput = document.createElement('input');
    progInput.type = 'number';
    progInput.min = '0';
    progInput.max = '127';
    progInput.value = String(part.values.program);
    progInput.addEventListener('change', () => {
      const v = clamp7(parseInt(progInput.value, 10) || 0);
      progInput.value = String(v);
      part.values.program = v;
      sendMultiPartParam(index, 33, v);
    });
    progField.appendChild(progLabel);
    progField.appendChild(progInput);
    main.appendChild(progField);

    // low / high key
    main.appendChild(createKeyField(index, PART_PARAMS.find(p => p.id === 'lowkey')));
    main.appendChild(createKeyField(index, PART_PARAMS.find(p => p.id === 'highkey')));

    // transpose / detune knobs
    main.appendChild(createPartKnob(index, PART_PARAMS.find(p => p.id === 'transpose')));
    main.appendChild(createPartKnob(index, PART_PARAMS.find(p => p.id === 'detune')));

    // output select
    main.appendChild(createSelectField('out', OUTPUT_NAMES, part.values.output, (v) => {
      part.values.output = v;
      sendMultiPartParam(index, 41, v);
    }));

    // expanded per-part sound editor
    const editor = document.createElement('div');
    editor.className = 'part-editor hidden';
    SECTIONS.forEach(sec => {
      const sub = document.createElement('div');
      sub.className = 'subsection section-' + sec.key;
      const h3 = document.createElement('h3');
      h3.textContent = sec.title;
      sub.appendChild(h3);

      const knobs = document.createElement('div');
      knobs.className = 'knobs';
      PARAMS.filter(p => p.section === sec.key).forEach(param => {
        knobs.appendChild(createPartSoundKnob(index, param));
      });
      sub.appendChild(knobs);
      editor.appendChild(sub);
    });

    const editBtn = document.createElement('button');
    editBtn.textContent = 'edit';
    editBtn.addEventListener('click', () => {
      const collapsed = editor.classList.toggle('hidden');
      editBtn.textContent = collapsed ? 'edit' : 'close';
    });
    main.appendChild(editBtn);

    row.appendChild(main);
    row.appendChild(editor);
    return row;
  }

  function buildMultiView(){
    const partList = document.getElementById('partList');
    partList.innerHTML = '';
    for (let i = 0; i < NUM_PARTS; i++){
      partList.appendChild(createPartRow(i));
    }
  }

  // global multi controls
  const playModeSelect = document.getElementById('playModeSelect');
  playModeSelect.addEventListener('change', () => {
    const v = parseInt(playModeSelect.value, 10);
    if (selectedOutput){
      try{ selectedOutput.send(buildSysEx(122, v)); } catch(e){ console.error('MIDI send error', e); }
    }
  });

  const multiProgramInput = document.getElementById('multiProgramInput');
  document.getElementById('btnMultiLoad').addEventListener('click', () => {
    const v = clamp7(parseInt(multiProgramInput.value, 10) || 0);
    multiProgramInput.value = String(v);
    if (selectedOutput){
      try{ selectedOutput.send(buildSysEx(105, v)); } catch(e){ console.error('MIDI send error', e); }
    }
  });
  document.getElementById('btnMultiSave').addEventListener('click', () => {
    const v = clamp7(parseInt(multiProgramInput.value, 10) || 0);
    multiProgramInput.value = String(v);
    if (selectedOutput){
      try{
        selectedOutput.send(new Uint8Array([...SYSEX_PREFIX, deviceId(), SYSEX_CMD_STORE, v & 0x7F, 0xF7]));
      } catch(e){ console.error('MIDI send error', e); }
    }
  });

  // single | multi tab switching
  const tabSingle = document.getElementById('tabSingle');
  const tabMulti = document.getElementById('tabMulti');
  const singleView = document.getElementById('singleView');
  const multiView = document.getElementById('multiView');

  function setMode(mode){
    const isMulti = mode === 'multi';
    tabMulti.classList.toggle('active', isMulti);
    tabSingle.classList.toggle('active', !isMulti);
    multiView.classList.toggle('hidden', !isMulti);
    singleView.classList.toggle('hidden', isMulti);
  }

  tabSingle.addEventListener('click', () => setMode('single'));
  tabMulti.addEventListener('click', () => setMode('multi'));

  // ---------------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------------
  buildSections();
  renderLibrary();
  buildMultiView();
})();
</script>
</body>
</html>
