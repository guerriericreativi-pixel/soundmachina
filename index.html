<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>virus ti snow // editor</title>
<style>
  :root{
    --bg: #ffffff;
    --fg: #000000;
    --section-bg: #f5f5f5;
    --border: #000000;
    --dot-color: #e8e8e8;
  }
  html[data-theme="dark"]{
    --bg: #111111;
    --fg: #eeeeee;
    --section-bg: #1a1a1a;
    --border: #333333;
    --dot-color: #222222;
  }
  *{
    box-sizing: border-box;
  }
  html, body{
    height: 100%;
  }
  body{
    margin: 0;
    background-color: var(--bg);
    background-image: radial-gradient(circle, var(--dot-color) 1px, transparent 1.5px);
    background-size: 8px 8px;
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-weight: 300;
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 16px;
    transition: background-color 200ms ease, color 200ms ease;
  }

  /* ------------------------------------------------------------------ */
  /* header                                                              */
  /* ------------------------------------------------------------------ */
  .header{
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    padding-bottom: 8px;
    min-height: 48px;
  }
  .header-top{
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
  }
  .visualizer{
    flex: 0 1 auto;
    display: block;
    width: 400px;
    max-width: 100%;
    height: 40px;
    min-width: 0;
    transition: opacity 300ms ease;
  }
  .visualizer.flash{
    opacity: 1;
    filter: brightness(1.6);
  }
  .header-controls{
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header-title{
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    align-self: flex-start;
    margin-top: 8px;
  }
  .field{
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .field label{
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--fg);
    text-transform: lowercase;
  }
  select{
    background: transparent;
    color: var(--fg);
    border: none;
    border-bottom: 1px solid var(--border);
    font-family: inherit;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    padding: 2px 0;
    outline: none;
    text-transform: lowercase;
  }
  .conn{
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
  }
  .dot{
    width: 8px;
    height: 8px;
    border: 1px solid var(--border);
    border-radius: 50%;
    background: transparent;
    transition: transform 100ms ease;
  }
  .dot.on{
    background: var(--fg);
  }
  .dot.pulse{
    animation: ledBounce 400ms ease-out;
  }
  @keyframes ledBounce{
    0%{ transform: scale(1); }
    50%{ transform: scale(1.8); }
    100%{ transform: scale(1); }
  }
  .theme-toggle{
    font-size: 14px;
    line-height: 1;
    padding: 4px 8px;
  }

  /* ------------------------------------------------------------------ */
  /* buttons                                                             */
  /* ------------------------------------------------------------------ */
  .actions{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  button{
    background: none;
    border: 1px solid var(--border);
    color: var(--fg);
    font-family: inherit;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    cursor: pointer;
    border-radius: 0;
    padding: 6px 12px;
    transition: background-color 100ms ease, color 100ms ease;
  }
  button:hover{
    background: var(--fg);
    color: var(--bg);
  }

  /* ------------------------------------------------------------------ */
  /* section grid                                                        */
  /* ------------------------------------------------------------------ */
  .grid{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  @media (orientation: landscape) and (min-width: 900px){
    .grid{
      grid-template-columns: repeat(3, 1fr);
    }
  }
  .section{
    position: relative;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--section-bg);
    padding: 16px;
    border-radius: 0;
    transition: background-color 200ms ease, border-color 200ms ease;
  }
  .section::after{
    content: '';
    position: absolute;
    left: 0;
    right: 0;
    top: -2px;
    height: 2px;
    background: var(--fg);
    opacity: 0;
    pointer-events: none;
  }
  .section:hover::after{
    animation: scan 600ms linear;
  }
  @keyframes scan{
    0%{ top: 0; opacity: 0.6; }
    100%{ top: 100%; opacity: 0; }
  }
  .section h2{
    margin: 0 0 16px 0;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    color: var(--fg);
  }

  /* ------------------------------------------------------------------ */
  /* knobs                                                               */
  /* ------------------------------------------------------------------ */
  .knobs{
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
  }
  .knob-container{
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 56px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  .knob-svg{
    cursor: ns-resize;
    width: 40px;
    height: 40px;
  }
  .knob-indicator{
    transform-origin: 50% 50%;
  }
  .knob-label{
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: lowercase;
    margin-top: 4px;
    color: var(--fg);
    white-space: nowrap;
  }
  .knob-value{
    font-family: "SF Mono", Menlo, Monaco, monospace;
    font-size: 13px;
    font-weight: 700;
    margin-top: 2px;
    color: var(--fg);
    cursor: pointer;
    min-height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ripple-dot{
    position: absolute;
    left: 50%;
    top: 50%;
    width: 4px;
    height: 4px;
    margin: -2px 0 0 -2px;
    border-radius: 50%;
    background: var(--fg);
    pointer-events: none;
    animation: rippleOut 400ms ease-out forwards;
  }
  @keyframes rippleOut{
    from{ transform: translate(0, 0) scale(1); opacity: 0.8; }
    to{ transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
  }

  /* ------------------------------------------------------------------ */
  /* patch library                                                       */
  /* ------------------------------------------------------------------ */
  .lib-row{
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    margin-bottom: 16px;
  }
  input[type="text"]{
    flex: 1;
    min-width: 140px;
    background: transparent;
    color: var(--fg);
    border: none;
    border-bottom: 1px solid var(--border);
    font-family: inherit;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.05em;
    padding: 4px 0;
    outline: none;
    text-transform: lowercase;
  }
  .lib-list{
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 200px;
    overflow-y: auto;
  }
  .lib-item{
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    gap: 8px;
  }
  .lib-item .name{
    letter-spacing: 0.05em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .lib-item .btns{ display: flex; gap: 8px; flex: 0 0 auto; }
  .lib-item button{ padding: 4px 10px; }
  input[type="file"]{ display: none; }
  .small{ font-size: 10px; color: var(--fg); opacity: 0.5; letter-spacing: 0.05em; }

  /* ------------------------------------------------------------------ */
  /* iPad 11" (1194x834 landscape / 834x1194 portrait)                   */
  /* ------------------------------------------------------------------ */
  @media (min-width: 768px){
    body{
      font-size: 14px;
      background-size: 10px 10px;
      padding: 16px 24px;
    }
    .header{
      min-height: 60px;
    }
    .header-title{
      font-size: 14px;
    }
    .grid{
      gap: 16px;
    }
    .section{
      padding: 24px;
    }
    .knob-label{
      font-size: 13px;
    }
    .knob-svg{
      width: 56px;
      height: 56px;
    }
    .knob-container{
      width: 72px;
    }
    .knob-value{
      min-width: 44px;
      min-height: 44px;
      font-size: 15px;
    }
    button{
      min-height: 44px;
      padding: 12px 24px;
      font-size: 13px;
    }
    select{
      min-height: 44px;
      font-size: 13px;
    }
    .lib-item button{
      min-height: 44px;
      min-width: 44px;
    }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <canvas class="visualizer" id="visualizer"></canvas>
    <div class="header-controls">
      <div class="field">
        <label>output</label>
        <select id="midiOutSelect"><option value="">none</option></select>
      </div>
      <div class="field">
        <label>channel</label>
        <select id="midiChannel"></select>
      </div>
      <div class="conn">
        <span class="dot" id="connDot"></span>
        <span id="connLabel">disconnected</span>
      </div>
      <button class="theme-toggle" id="themeToggle">○</button>
    </div>
  </div>
  <div class="header-title">virus ti snow</div>
</div>

<div class="actions">
  <button id="btnRandomize">randomize</button>
  <button id="btnInit">init</button>
  <button id="btnExport">export .syx</button>
  <button id="btnImport">import .syx</button>
  <input type="file" id="fileInput" accept=".syx">
</div>

<div class="grid" id="sectionsContainer"></div>

<script>
(function(){
  // ---------------------------------------------------------------------
  // Parameter definitions: Virus TI parameter numbers per spec
  // SysEx format: F0 00 20 33 01 [DeviceID] 01 [param] [value] F7
  // ---------------------------------------------------------------------
  const SECTIONS = [
    { key: 'osc',    title: 'oscillators' },
    { key: 'filter', title: 'filter 1' },
    { key: 'amp',    title: 'amplifier' },
    { key: 'lfo',    title: 'lfo 1' },
    { key: 'fx',     title: 'effects' },
  ];

  const PARAMS = [
    // Oscillator 1
    { id:'osc1_wave',       name:'Osc1 Waveform',     short:'o1wv', section:'osc', cc:17, default:0 },
    { id:'osc1_pw',         name:'Osc1 Pulsewidth',   short:'o1pw', section:'osc', cc:18, default:64 },
    { id:'osc1_waveselect', name:'Osc1 Wave Select',  short:'o1ws', section:'osc', cc:19, default:0 },
    { id:'osc1_semitone',   name:'Osc1 Semitone',     short:'o1st', section:'osc', cc:20, default:64, bipolar:true },
    // Oscillator 2
    { id:'osc2_wave',       name:'Osc2 Waveform',     short:'o2wv', section:'osc', cc:22, default:0 },
    { id:'osc2_pw',         name:'Osc2 Pulsewidth',   short:'o2pw', section:'osc', cc:23, default:64 },
    { id:'osc2_waveselect', name:'Osc2 Wave Select',  short:'o2ws', section:'osc', cc:24, default:0 },
    { id:'osc2_semitone',   name:'Osc2 Semitone',     short:'o2st', section:'osc', cc:25, default:64, bipolar:true },
    // Shared detune (Osc1/Osc2)
    { id:'osc_detune',      name:'Osc Detune',        short:'det',  section:'osc', cc:26, default:0 },

    // Filter 1
    { id:'f1_cutoff',    name:'Cutoff',            short:'cutt', section:'filter', cc:40, default:127 },
    { id:'f1_resonance', name:'Resonance',         short:'res',  section:'filter', cc:42, default:0 },
    { id:'f1_envamount', name:'Env Amount',        short:'env',  section:'filter', cc:44, default:64, bipolar:true },
    { id:'f1_keytrack',  name:'Keyboard Track',    short:'key',  section:'filter', cc:46, default:0 },

    // Amplifier
    { id:'amp_attack',  name:'Attack',  short:'atk', section:'amp', cc:59, default:0 },
    { id:'amp_decay',   name:'Decay',   short:'dcy', section:'amp', cc:60, default:0 },
    { id:'amp_sustain', name:'Sustain', short:'sus', section:'amp', cc:61, default:127 },
    { id:'amp_release', name:'Release', short:'rel', section:'amp', cc:63, default:0 },

    // LFO 1
    { id:'lfo1_rate',  name:'Rate',  short:'rate', section:'lfo', cc:67, default:64 },
    { id:'lfo1_shape', name:'Shape', short:'shp',  section:'lfo', cc:68, default:0 },

    // Effects
    { id:'fx_chorus_mix',      name:'Chorus Mix',      short:'chmx', section:'fx', cc:105, default:0 },
    { id:'fx_chorus_rate',     name:'Chorus Rate',     short:'chrt', section:'fx', cc:106, default:64 },
    { id:'fx_delay_time',      name:'Delay Time',      short:'dlt',  section:'fx', cc:114, default:0 },
    { id:'fx_delay_feedback',  name:'Delay Feedback',  short:'dlfb', section:'fx', cc:115, default:0 },
  ];

  const SYSEX_PREFIX = [0xF0, 0x00, 0x20, 0x33, 0x01];
  const SYSEX_CMD_PARAM = 0x01; // single parameter change

  // ---------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------
  const patch = {};
  PARAMS.forEach(p => { patch[p.id] = p.default; });

  let midiAccess = null;
  let selectedOutput = null;
  let wasConnected = false;

  const LIB_KEY = 'virusTiSnow_patchLibrary';
  const THEME_KEY = 'virusTiSnow_theme';

  // ---------------------------------------------------------------------
  // Theme toggle (persisted in localStorage)
  // ---------------------------------------------------------------------
  const themeToggle = document.getElementById('themeToggle');

  function applyTheme(theme){
    if (theme === 'dark'){
      document.documentElement.setAttribute('data-theme', 'dark');
      themeToggle.textContent = '●'; // ●
    } else {
      document.documentElement.removeAttribute('data-theme');
      themeToggle.textContent = '○'; // ○
    }
  }

  let currentTheme = localStorage.getItem(THEME_KEY) || 'light';
  applyTheme(currentTheme);

  themeToggle.addEventListener('click', () => {
    currentTheme = (currentTheme === 'light') ? 'dark' : 'light';
    localStorage.setItem(THEME_KEY, currentTheme);
    applyTheme(currentTheme);
  });

  // ---------------------------------------------------------------------
  // Header visualizer — OP-XY style scrolling piano-roll dot matrix.
  // 40x8 grid of dots scrolling right-to-left. New columns are generated
  // as a musical sequence (pentatonic rows). Speed/density react to the
  // MIDI connection state. Canvas + requestAnimationFrame for 60fps.
  // ---------------------------------------------------------------------
  const visualizer = document.getElementById('visualizer');
  const vctx = visualizer.getContext('2d');

  const VIS_COLS = 40;     // grid columns
  const VIS_ROWS = 8;      // grid rows
  const VIS_DOT = 5;       // dot diameter
  const VIS_GAP = 2;       // gap between dots
  const VIS_CELL = VIS_DOT + VIS_GAP; // 7px per cell
  // pentatonic row positions (0 = top .. 7 = bottom) for a musical feel
  const PENTA_ROWS = [0, 1, 3, 4, 6, 7];

  let visDPR = 1;
  let visW = 0, visH = 0;

  function resizeVisualizer(){
    const rect = visualizer.getBoundingClientRect();
    visDPR = window.devicePixelRatio || 1;
    visW = Math.max(1, Math.floor(rect.width));
    visH = Math.max(1, Math.floor(rect.height));
    visualizer.width = visW * visDPR;
    visualizer.height = visH * visDPR;
    vctx.setTransform(visDPR, 0, 0, visDPR, 0, 0);
  }

  // grid[col] = array of active row indices for that column
  const grid = [];
  let melodyStep = 0;       // walks up/down the pentatonic scale
  let melodyDir = 1;

  function generateColumn(){
    const connected = wasConnected;
    // density: 1 dot when disconnected, 2-3 when connected
    const count = connected ? (2 + (Math.random() < 0.5 ? 0 : 1)) : 1;

    // melodic walk: advance the base step up/down the pentatonic scale
    melodyStep += melodyDir;
    if (melodyStep >= PENTA_ROWS.length - 1){ melodyStep = PENTA_ROWS.length - 1; melodyDir = -1; }
    if (melodyStep <= 0){ melodyStep = 0; melodyDir = 1; }
    // occasionally jump for variety
    if (Math.random() < 0.15){
      melodyStep = Math.floor(Math.random() * PENTA_ROWS.length);
    }

    const rows = new Set();
    rows.add(PENTA_ROWS[melodyStep]);
    // add harmony notes (thirds/fifths within the pentatonic set)
    while (rows.size < count){
      const offset = 1 + Math.floor(Math.random() * 2); // a third or fifth up
      const idx = (melodyStep + offset) % PENTA_ROWS.length;
      rows.add(PENTA_ROWS[idx]);
    }
    return [...rows];
  }

  // seed the grid
  for (let c = 0; c < VIS_COLS; c++){ grid.push(generateColumn()); }

  function dotColors(){
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    return dark
      ? { active: '#ffffff', inactive: '#333333' }
      : { active: '#000000', inactive: '#dddddd' };
  }

  let lastStep = 0;
  function stepInterval(){
    return wasConnected ? 80 : 120; // ms per column (faster when connected)
  }

  function renderVisualizer(t){
    // advance the scroll on a musical clock
    if (t - lastStep >= stepInterval()){
      lastStep = t;
      grid.shift();
      grid.push(generateColumn());
    }

    vctx.clearRect(0, 0, visW, visH);
    const colors = dotColors();
    // center the 40x8 grid in the canvas
    const gridW = VIS_COLS * VIS_CELL - VIS_GAP;
    const gridH = VIS_ROWS * VIS_CELL - VIS_GAP;
    const x0 = Math.max(0, (visW - gridW) / 2);
    const y0 = Math.max(0, (visH - gridH) / 2);
    const r = VIS_DOT / 2;

    for (let c = 0; c < VIS_COLS; c++){
      const activeRows = grid[c] || [];
      const cx = x0 + c * VIS_CELL + r;
      for (let row = 0; row < VIS_ROWS; row++){
        const isActive = activeRows.indexOf(row) !== -1;
        const cy = y0 + row * VIS_CELL + r;
        vctx.beginPath();
        vctx.arc(cx, cy, r, 0, Math.PI * 2);
        if (isActive){
          vctx.fillStyle = colors.active;
          vctx.globalAlpha = 1;
        } else {
          vctx.fillStyle = colors.inactive;
          vctx.globalAlpha = 0.3;
        }
        vctx.fill();
      }
    }
    vctx.globalAlpha = 1;
    requestAnimationFrame(renderVisualizer);
  }

  resizeVisualizer();
  window.addEventListener('resize', resizeVisualizer);
  requestAnimationFrame(renderVisualizer);

  // ---------------------------------------------------------------------
  // MIDI setup
  // ---------------------------------------------------------------------
  const outSelect = document.getElementById('midiOutSelect');
  const chanSelect = document.getElementById('midiChannel');
  const connDot = document.getElementById('connDot');
  const connLabel = document.getElementById('connLabel');

  for (let i = 1; i <= 16; i++){
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = 'channel ' + i;
    chanSelect.appendChild(opt);
  }
  chanSelect.value = 1;

  function flashConnected(){
    connDot.classList.remove('pulse');
    // force reflow so the animation can restart
    void connDot.offsetWidth;
    connDot.classList.add('pulse');

    visualizer.classList.remove('flash');
    void visualizer.offsetWidth;
    visualizer.classList.add('flash');
    setTimeout(() => visualizer.classList.remove('flash'), 500);
  }

  function updateConnectionIndicator(){
    const isConnected = !!(selectedOutput && selectedOutput.state === 'connected');
    if (isConnected){
      connDot.classList.add('on');
      connLabel.textContent = 'connected: ' + selectedOutput.name;
      if (!wasConnected) flashConnected();
    } else {
      connDot.classList.remove('on');
      connLabel.textContent = 'disconnected';
    }
    wasConnected = isConnected;
  }

  function refreshOutputs(){
    const prev = outSelect.value;
    outSelect.innerHTML = '<option value="">none</option>';
    if (!midiAccess) return;
    midiAccess.outputs.forEach(output => {
      const opt = document.createElement('option');
      opt.value = output.id;
      opt.textContent = output.name;
      outSelect.appendChild(opt);
    });
    if (prev && [...outSelect.options].some(o => o.value === prev)){
      outSelect.value = prev;
    }
    onOutputChange();
  }

  function onOutputChange(){
    const id = outSelect.value;
    selectedOutput = (midiAccess && id) ? midiAccess.outputs.get(id) : null;
    updateConnectionIndicator();
  }

  outSelect.addEventListener('change', onOutputChange);

  if (navigator.requestMIDIAccess){
    navigator.requestMIDIAccess({ sysex: true }).then(access => {
      midiAccess = access;
      refreshOutputs();
      midiAccess.onstatechange = refreshOutputs;
    }).catch(err => {
      connLabel.textContent = 'midi unavailable';
      console.error(err);
    });
  } else {
    connLabel.textContent = 'web midi not supported';
  }

  // ---------------------------------------------------------------------
  // SysEx send
  // ---------------------------------------------------------------------
  function deviceId(){
    return parseInt(chanSelect.value, 10) - 1; // 0-15
  }

  function buildSysEx(cc, value){
    return new Uint8Array([
      ...SYSEX_PREFIX,
      deviceId(),
      SYSEX_CMD_PARAM,
      cc & 0x7F,
      value & 0x7F,
      0xF7
    ]);
  }

  function sendParam(param, value){
    if (selectedOutput){
      try{
        selectedOutput.send(buildSysEx(param.cc, value));
      } catch(e){ console.error('MIDI send error', e); }
    }
  }

  function sendFullPatch(p){
    PARAMS.forEach((param, i) => {
      setTimeout(() => sendParam(param, p[param.id]), i * 15);
    });
  }

  // ---------------------------------------------------------------------
  // Knob UI — thin-stroke circle with a single radial indicator line
  // showing the current value (-135deg to +135deg sweep, 0deg = up).
  // ---------------------------------------------------------------------
  const svgNS = 'http://www.w3.org/2000/svg';
  const KNOB_SIZE = 40;
  const KNOB_CENTER = KNOB_SIZE / 2;
  const KNOB_RADIUS = 16;

  function angleForValue(value){
    return -135 + (value / 127) * 270;
  }

  function displayValue(param, value){
    if (param.bipolar) {
      const v = value - 64;
      return (v > 0 ? '+' : '') + v;
    }
    return String(value);
  }

  // spawn a brief ripple of dots radiating outward from a knob
  function spawnRipple(container){
    const RIPPLE_COUNT = 8;
    for (let i = 0; i < RIPPLE_COUNT; i++){
      const angle = (i / RIPPLE_COUNT) * Math.PI * 2;
      const dot = document.createElement('div');
      dot.className = 'ripple-dot';
      dot.style.setProperty('--dx', (Math.cos(angle) * 28) + 'px');
      dot.style.setProperty('--dy', (Math.sin(angle) * 28) + 'px');
      container.appendChild(dot);
      setTimeout(() => dot.remove(), 450);
    }
  }

  function createKnob(param){
    const container = document.createElement('div');
    container.className = 'knob-container';

    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('viewBox', `0 0 ${KNOB_SIZE} ${KNOB_SIZE}`);
    svg.classList.add('knob-svg');

    // thin stroke circle, no fill
    const circle = document.createElementNS(svgNS, 'circle');
    circle.setAttribute('cx', KNOB_CENTER);
    circle.setAttribute('cy', KNOB_CENTER);
    circle.setAttribute('r', KNOB_RADIUS);
    circle.setAttribute('fill', 'none');
    circle.setAttribute('stroke', 'currentColor');
    circle.setAttribute('stroke-width', '0.5');
    svg.appendChild(circle);

    // single thin line from center to edge, rotated to show the value
    const indicator = document.createElementNS(svgNS, 'g');
    indicator.classList.add('knob-indicator');
    const line = document.createElementNS(svgNS, 'line');
    line.setAttribute('x1', KNOB_CENTER);
    line.setAttribute('y1', KNOB_CENTER);
    line.setAttribute('x2', KNOB_CENTER);
    line.setAttribute('y2', KNOB_CENTER - KNOB_RADIUS);
    line.setAttribute('stroke', 'currentColor');
    line.setAttribute('stroke-width', '1');
    indicator.appendChild(line);
    svg.appendChild(indicator);

    svg.style.color = 'var(--fg)';

    const label = document.createElement('div');
    label.className = 'knob-label';
    label.textContent = param.short || param.name;

    const valueLabel = document.createElement('div');
    valueLabel.className = 'knob-value';

    container.appendChild(svg);
    container.appendChild(label);
    container.appendChild(valueLabel);

    function render(){
      const value = patch[param.id];
      indicator.style.transform = `rotate(${angleForValue(value)}deg)`;
      valueLabel.textContent = displayValue(param, value);
    }

    function setValue(value, send, opts){
      value = Math.max(0, Math.min(127, Math.round(value)));
      const changed = patch[param.id] !== value;
      patch[param.id] = value;
      render();
      if (changed && !(opts && opts.silent)) spawnRipple(container);
      if (send) sendParam(param, value);
    }

    // drag interaction
    let dragging = false;
    let startY = 0;
    let startVal = 0;

    svg.addEventListener('pointerdown', (e) => {
      dragging = true;
      startY = e.clientY;
      startVal = patch[param.id];
      svg.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    svg.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      const dy = startY - e.clientY;
      setValue(startVal + dy * 0.7, true);
    });

    function endDrag(e){
      dragging = false;
    }
    svg.addEventListener('pointerup', endDrag);
    svg.addEventListener('pointercancel', endDrag);

    // double-click resets to default
    svg.addEventListener('dblclick', () => {
      setValue(param.default, true);
    });

    // tap/click the value box to type an exact value
    valueLabel.addEventListener('click', () => {
      const current = patch[param.id];
      const input = prompt('value (0-127):', current);
      if (input === null) return;
      const num = parseInt(input, 10);
      if (!isNaN(num)) setValue(num, true);
    });

    container._render = render;
    container._setValue = setValue;
    render();

    return container;
  }

  // ---------------------------------------------------------------------
  // Build sections
  // ---------------------------------------------------------------------
  const knobRefs = {}; // id -> container element
  const allKnobsInOrder = [];

  function buildSections(){
    const root = document.getElementById('sectionsContainer');
    root.innerHTML = '';
    SECTIONS.forEach(sec => {
      const div = document.createElement('div');
      div.className = 'section';
      const h2 = document.createElement('h2');
      h2.textContent = sec.title;
      div.appendChild(h2);

      const knobs = document.createElement('div');
      knobs.className = 'knobs';

      PARAMS.filter(p => p.section === sec.key).forEach(param => {
        const knob = createKnob(param);
        knobRefs[param.id] = knob;
        allKnobsInOrder.push(knob);
        knobs.appendChild(knob);
      });

      div.appendChild(knobs);
      root.appendChild(div);
    });

    // patch library section
    const libSection = document.createElement('div');
    libSection.className = 'section';
    const libTitle = document.createElement('h2');
    libTitle.textContent = 'patch library';
    libSection.appendChild(libTitle);

    const libRow = document.createElement('div');
    libRow.className = 'lib-row';
    const nameInput = document.createElement('input');
    nameInput.type = 'text';
    nameInput.id = 'patchName';
    nameInput.placeholder = 'patch name';
    const saveBtn = document.createElement('button');
    saveBtn.id = 'btnSavePatch';
    saveBtn.textContent = 'save';
    libRow.appendChild(nameInput);
    libRow.appendChild(saveBtn);
    libSection.appendChild(libRow);

    const libList = document.createElement('div');
    libList.className = 'lib-list';
    libList.id = 'libList';
    libSection.appendChild(libList);

    root.appendChild(libSection);

    saveBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name){
        alert('enter a patch name');
        return;
      }
      const lib = loadLibrary();
      lib[name] = { ...patch };
      saveLibrary(lib);
      nameInput.value = '';
      renderLibrary();
    });
  }

  function refreshAllKnobs(){
    PARAMS.forEach(p => knobRefs[p.id]._render());
  }

  function applyPatchObject(p, send){
    PARAMS.forEach(param => {
      const value = (p[param.id] !== undefined) ? p[param.id] : param.default;
      patch[param.id] = Math.max(0, Math.min(127, value));
    });
    refreshAllKnobs();
    if (send) sendFullPatch(patch);
  }

  // smoothly animate every knob's indicator with the same transition
  function animateAllKnobs(duration){
    allKnobsInOrder.forEach(knob => {
      const indicator = knob.querySelector('.knob-indicator');
      indicator.style.transition = `transform ${duration}ms ease-in-out`;
    });
    setTimeout(() => {
      allKnobsInOrder.forEach(knob => {
        knob.querySelector('.knob-indicator').style.transition = '';
      });
    }, duration + 50);
  }

  // animate knobs in a left-to-right cascade (used by randomize)
  function animateCascade(stepDuration, stagger){
    allKnobsInOrder.forEach((knob, i) => {
      const indicator = knob.querySelector('.knob-indicator');
      indicator.style.transition = `transform ${stepDuration}ms ease-out`;
      indicator.style.transitionDelay = (i * stagger) + 'ms';
    });
    const total = stepDuration + allKnobsInOrder.length * stagger + 50;
    setTimeout(() => {
      allKnobsInOrder.forEach(knob => {
        const indicator = knob.querySelector('.knob-indicator');
        indicator.style.transition = '';
        indicator.style.transitionDelay = '';
      });
    }, total);
  }

  // ---------------------------------------------------------------------
  // Buttons: Randomize / Init
  // ---------------------------------------------------------------------
  document.getElementById('btnRandomize').addEventListener('click', () => {
    animateCascade(150, 30);
    const newPatch = {};
    PARAMS.forEach(p => { newPatch[p.id] = Math.floor(Math.random() * 128); });
    applyPatchObject(newPatch, true);
  });

  document.getElementById('btnInit').addEventListener('click', () => {
    animateAllKnobs(300);
    const newPatch = {};
    PARAMS.forEach(p => { newPatch[p.id] = p.default; });
    applyPatchObject(newPatch, true);
  });

  // ---------------------------------------------------------------------
  // Export / Import .syx
  // ---------------------------------------------------------------------
  document.getElementById('btnExport').addEventListener('click', () => {
    const bytes = [];
    PARAMS.forEach(param => {
      bytes.push(...buildSysEx(param.cc, patch[param.id]));
    });
    const blob = new Blob([new Uint8Array(bytes)], { type: 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'virus_ti_patch.syx';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  const fileInput = document.getElementById('fileInput');
  document.getElementById('btnImport').addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const bytes = new Uint8Array(reader.result);
      const newPatch = {};
      let i = 0;
      while (i < bytes.length){
        if (bytes[i] === 0xF0){
          // find matching F7
          let j = i + 1;
          while (j < bytes.length && bytes[j] !== 0xF7) j++;
          if (j < bytes.length){
            const msg = bytes.slice(i, j + 1);
            // Expect: F0 00 20 33 01 [DeviceID] 01 [param] [value] F7
            if (msg.length === 10 &&
                msg[1] === 0x00 && msg[2] === 0x20 && msg[3] === 0x33 &&
                msg[4] === 0x01 && msg[6] === 0x01){
              const cc = msg[7];
              const value = msg[8];
              const param = PARAMS.find(p => p.cc === cc);
              if (param) newPatch[param.id] = value;
            }
            i = j + 1;
            continue;
          }
        }
        i++;
      }
      animateAllKnobs(300);
      applyPatchObject(newPatch, true);
    };
    reader.readAsArrayBuffer(file);
    fileInput.value = '';
  });

  // ---------------------------------------------------------------------
  // Patch library (localStorage)
  // ---------------------------------------------------------------------
  function loadLibrary(){
    try{
      return JSON.parse(localStorage.getItem(LIB_KEY)) || {};
    } catch(e){ return {}; }
  }

  function saveLibrary(lib){
    localStorage.setItem(LIB_KEY, JSON.stringify(lib));
  }

  function renderLibrary(){
    const lib = loadLibrary();
    const list = document.getElementById('libList');
    list.innerHTML = '';
    const names = Object.keys(lib).sort();
    if (names.length === 0){
      const empty = document.createElement('div');
      empty.className = 'small';
      empty.textContent = 'no patches saved';
      list.appendChild(empty);
      return;
    }
    names.forEach(name => {
      const item = document.createElement('div');
      item.className = 'lib-item';

      const nameEl = document.createElement('span');
      nameEl.className = 'name';
      nameEl.textContent = name;

      const btns = document.createElement('div');
      btns.className = 'btns';

      const loadBtn = document.createElement('button');
      loadBtn.textContent = 'load';
      loadBtn.addEventListener('click', () => {
        animateAllKnobs(300);
        applyPatchObject(lib[name], true);
      });

      const delBtn = document.createElement('button');
      delBtn.textContent = 'delete';
      delBtn.addEventListener('click', () => {
        if (confirm(`delete patch "${name}"?`)){
          delete lib[name];
          saveLibrary(lib);
          renderLibrary();
        }
      });

      btns.appendChild(loadBtn);
      btns.appendChild(delBtn);
      item.appendChild(nameEl);
      item.appendChild(btns);
      list.appendChild(item);
    });
  }

  // ---------------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------------
  buildSections();
  renderLibrary();
})();
</script>
</body>
</html>
